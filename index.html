<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DART 공시 뷰어</title>


<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }

  .header {
    background: #1B3A6B; color: white; padding: 18px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header span.sub { font-size: 13px; opacity: 0.7; margin-left: auto; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .api-setup, .search-box, .notice {
    background: white; border-radius: 10px; padding: 20px;
    margin-bottom: 20px; border: 1px solid #e2e8f0;
  }
  .api-setup h3 { font-size: 14px; color: #555; margin-bottom: 10px; }
  .api-row, .search-row { display: flex; gap: 10px; }
  .api-row input, .search-row input {
    flex: 1; padding: 12px 16px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 15px;
  }
  .api-row input { font-family: monospace; }
  input:focus { outline: none; border-color: #1B3A6B; }

  button {
    border: none; border-radius: 8px; cursor: pointer;
    font-weight: 600; white-space: nowrap;
  }
  .btn-save, .btn-search {
    background: #1B3A6B; color: white;
  }
  .btn-save { padding: 10px 18px; }
  .btn-search { padding: 12px 24px; }
  .btn-save:hover, .btn-search:hover { background: #2E5DA8; }
  .btn-search:disabled { background: #9ca3af; cursor: not-allowed; }

  .api-status, .hint { font-size: 12px; margin-top: 8px; color: #888; line-height: 1.6; }
  .api-status.ok { color: #16a34a; }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .filter-btn {
    padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 20px;
    background: white; cursor: pointer; font-size: 13px; color: #555;
  }
  .filter-btn.active { background: #1B3A6B; color: white; border-color: #1B3A6B; }

  .company-info {
    background: #EEF3FB; border-radius: 10px; padding: 16px 20px;
    margin-bottom: 16px; border: 1px solid #C0CDE8; display: none;
  }
  .company-info h2 { font-size: 18px; color: #1B3A6B; margin-bottom: 6px; }
  .company-meta { font-size: 13px; color: #555; display: flex; gap: 16px; flex-wrap: wrap; }

  .results { display: none; }
  .results-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .results-count { font-size: 14px; color: #555; }
  .btn-copy-all {
    padding: 8px 16px; background: #059669; color: white;
  }

  .dart-item {
    background: white; border-radius: 10px; margin-bottom: 10px;
    border: 1px solid #e2e8f0; overflow: hidden;
  }
  .dart-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .item-header {
    padding: 14px 18px; cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .item-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 4px; white-space: nowrap; margin-top: 2px; flex-shrink: 0;
  }
  .badge-사업보고서 { background: #DBEAFE; color: #1e40af; }
  .badge-반기보고서 { background: #EDE9FE; color: #5b21b6; }
  .badge-분기보고서 { background: #D1FAE5; color: #065f46; }
  .badge-주요사항 { background: #FEF3C7; color: #92400e; }
  .badge-감사보고서 { background: #FCE7F3; color: #9d174d; }
  .badge-기타 { background: #F3F4F6; color: #374151; }

  .item-title { font-size: 14px; color: #1a1a1a; flex: 1; line-height: 1.5; }
  .item-date { font-size: 12px; color: #888; white-space: nowrap; margin-left: auto; }

  .item-body { display: none; padding: 0 18px 16px; }
  .item-body.open { display: block; }
  .item-links { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .btn-dart {
    padding: 7px 14px; border-radius: 6px; font-size: 13px;
    cursor: pointer; border: none; font-weight: 500;
  }
  .btn-open { background: #1B3A6B; color: white; }
  .btn-copy { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }

  .item-detail {
    background: #f8fafc; border-radius: 8px; padding: 14px;
    font-size: 13px; color: #333; line-height: 1.8;
    border: 1px solid #e2e8f0;
  }
  .detail-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .detail-label { color: #888; min-width: 80px; flex-shrink: 0; }
  .detail-value { color: #1a1a1a; }

  .loading {
    text-align: center; padding: 40px;
    color: #888; font-size: 15px; display: none;
  }
  .loading::before {
    content: ''; display: block; width: 36px; height: 36px;
    border: 3px solid #e2e8f0; border-top-color: #1B3A6B;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 40px; color: #888; display: none; }
  .error-msg {
    background: #FEE2E2; border: 1px solid #FCA5A5; border-radius: 8px;
    padding: 14px 18px; color: #991b1b; font-size: 14px;
    margin-bottom: 16px; display: none;
  }
  .notice { font-size: 13px; color: #555; line-height: 1.7; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1B3A6B; color: white; padding: 12px 20px;
    border-radius: 8px; font-size: 14px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .api-row, .search-row { flex-direction: column; }
    .header span.sub { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <span>📊</span>
  <h1>DART 공시 뷰어</h1>
  <span class="sub">투자 분석용 공시 조회 도구</span>
</div>

<div class="container">

  <div class="api-setup">
    <h3>🔑 DART API 키 설정</h3>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="DART OpenAPI 인증키를 입력하세요">
      <button class="btn-save" onclick="saveApiKey()">저장</button>
    </div>
    <div class="api-status" id="apiStatus">API 키를 입력하고 저장하세요.</div>
    <div class="hint">※ 이 페이지는 GitHub Pages용 정적 페이지입니다. API 키는 내 브라우저 localStorage에만 저장됩니다.</div>
  </div>

  <div class="search-box">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="기업명 또는 종목코드 입력 (예: 삼성전자, 005930)"
        onkeydown="if(event.key==='Enter') search()">
      <button class="btn-search" id="searchBtn" onclick="search()">조회</button>
    </div>
    <div class="filter-row">
      <span style="font-size:13px;color:#888;align-self:center;">공시 유형:</span>
      <button class="filter-btn active" onclick="setFilter(this,'')">전체</button>
      <button class="filter-btn" onclick="setFilter(this,'A001')">사업보고서</button>
      <button class="filter-btn" onclick="setFilter(this,'A002')">반기보고서</button>
      <button class="filter-btn" onclick="setFilter(this,'A003')">분기보고서</button>
      <button class="filter-btn" onclick="setFilter(this,'B001')">주요사항보고</button>
      <button class="filter-btn" onclick="setFilter(this,'F001')">감사보고서</button>
    </div>
  </div>

  <div class="notice">
    검색 방식: DART 고유번호 목록(corpCode.xml)을 먼저 불러온 뒤, 입력한 기업명 또는 종목코드를 DART 고유번호(corp_code)로 변환해 공시를 조회합니다.
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="company-info" id="companyInfo">
    <h2 id="companyName"></h2>
    <div class="company-meta" id="companyMeta"></div>
  </div>

  <div class="loading" id="loading">공시 데이터를 불러오는 중...</div>
  <div class="empty" id="emptyMsg">검색 결과가 없습니다.</div>

  <div class="results" id="results">
    <div class="results-header">
      <div class="results-count" id="resultsCount"></div>
      <button class="btn-copy-all" onclick="copyAll()">📋 전체 목록 복사</button>
    </div>
    <div id="resultsList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const PROXY = 'https://corsproxy.io/?';
const DART_BASE = 'https://opendart.fss.or.kr/api';

let apiKey = '';
let currentFilter = '';
let currentCorpCode = '';
let allDisclosures = [];
let corpList = [];
let corpListLoadedKey = '';

// ── API 키 관리 ──
function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) return showToast('API 키를 입력해주세요');
  apiKey = val;
  localStorage.setItem('dartApiKey', val);
  document.getElementById('apiStatus').textContent = '✅ API 키가 저장되었습니다. 이제 기업명 또는 종목코드로 조회하세요.';
  document.getElementById('apiStatus').className = 'api-status ok';
  showToast('API 키 저장 완료');
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('dartApiKey');
  if (saved) {
    apiKey = saved;
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('apiStatus').textContent = '✅ 저장된 API 키가 있습니다.';
    document.getElementById('apiStatus').className = 'api-status ok';
  }
});

// ── 필터 ──
function setFilter(el, val) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (allDisclosures.length) renderList(allDisclosures);
}

// ── 검색 ──
async function search() {
  if (!apiKey) return showError('API 키를 먼저 입력하고 저장해주세요.');

  const q = document.getElementById('searchInput').value.trim();
  if (!q) return showError('기업명 또는 종목코드를 입력해주세요.');

  showLoading(true);
  hideError();
  document.getElementById('companyInfo').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('emptyMsg').style.display = 'none';

  try {
    await loadCorpList();

    const corp = findCorp(q);
    if (!corp) {
      showLoading(false);
      return showError('기업을 찾을 수 없습니다. 예: 삼성전자 또는 005930처럼 입력해보세요.');
    }

    currentCorpCode = corp.corp_code;

    document.getElementById('companyName').textContent = corp.corp_name;
    document.getElementById('companyMeta').innerHTML =
      `<span>종목코드: ${corp.stock_code || '-'}</span>
       <span>DART 고유번호: ${corp.corp_code}</span>
       <span>최종변경일: ${corp.modify_date || '-'}</span>`;

    document.getElementById('companyInfo').style.display = 'block';

    const list = await getDisclosureList(corp.corp_code);
    allDisclosures = list;
    renderList(list);

  } catch(e) {
    showError('조회 중 오류가 발생했습니다: ' + e.message);
  } finally {
    showLoading(false);
  }
}

// ── DART 고유번호 목록 로드 ──
async function loadCorpList() {
  if (corpList.length) return;

  document.getElementById('loading').textContent =
    '기업 고유번호 목록을 불러오는 중...';

  const res = await fetch('corpData.json');

  if (!res.ok) {
    throw new Error('corpData.json 파일을 불러오지 못했습니다. GitHub에 corpData.json이 index.html과 같은 위치에 있는지 확인해주세요.');
  }

  corpList = await res.json();

  if (!Array.isArray(corpList) || !corpList.length) {
    throw new Error('corpData.json 파일이 비어 있거나 형식이 올바르지 않습니다.');
  }
}

// ── 기업명/종목코드 → corp_code 매칭 ──
function findCorp(query) {
  const clean = query.replace(/\s/g, '');
  const isStockCode = /^\d{6}$/.test(clean);

  if (isStockCode) {
    return corpList.find(c => c.stock_code === clean) || null;
  }

  const exact = corpList.find(c => c.corp_name === query);
  if (exact) return exact;

  const noSpaceExact = corpList.find(c => c.corp_name.replace(/\s/g, '') === clean);
  if (noSpaceExact) return noSpaceExact;

  const listedPartial = corpList.find(c =>
    c.stock_code && c.corp_name.replace(/\s/g, '').includes(clean)
  );
  if (listedPartial) return listedPartial;

  return corpList.find(c => c.corp_name.replace(/\s/g, '').includes(clean)) || null;
}

// ── 공시 목록 조회 ──
async function getDisclosureList(corpCode) {
  document.getElementById('loading').textContent = '공시 데이터를 불러오는 중...';

  const today = new Date();
  const end = formatDate(today);
  const startDate = new Date();
  startDate.setFullYear(startDate.getFullYear() - 2);
  const start = formatDate(startDate);

  const url = `${DART_BASE}/list.json?crtfc_key=${encodeURIComponent(apiKey)}&corp_code=${corpCode}&bgn_de=${start}&end_de=${end}&page_count=100`;

  const res = await fetch(PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error('공시 목록 요청에 실패했습니다.');

  const data = await res.json();

  if (data.status === '013') return [];
  if (data.status !== '000') throw new Error(data.message || '공시 조회 실패');

  return data.list || [];
}

// ── 렌더링 ──
function renderList(list) {
  const filtered = currentFilter
    ? list.filter(d => d.pblntf_ty === currentFilter || d.pblntf_detail_ty === currentFilter)
    : list;

  const container = document.getElementById('resultsList');
  container.innerHTML = '';

  if (!filtered.length) {
    document.getElementById('results').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }

  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('resultsCount').textContent = `총 ${filtered.length}건 (최근 2년)`;

  filtered.forEach(d => {
    const badge = getBadge(d.pblntf_ty, d.pblntf_detail_ty, d.report_nm);
    const div = document.createElement('div');
    div.className = 'dart-item';
    div.innerHTML = `
      <div class="item-header" onclick="toggleItem(this)">
        <span class="item-badge ${badge.cls}">${badge.label}</span>
        <span class="item-title">${escapeHtml(d.report_nm || '')}</span>
        <span class="item-date">${formatDateDisplay(d.rcept_dt)}</span>
      </div>
      <div class="item-body">
        <div class="item-links">
          <button class="btn-dart btn-open" onclick="openDart('${d.rcept_no}')">🔗 DART에서 열기</button>
          <button class="btn-dart btn-copy" onclick="copyItem('${d.rcept_no}', '${escapeJs(d.report_nm || '')}', '${d.rcept_dt}')">📋 이 공시 복사</button>
        </div>
        <div class="item-detail">
          <div class="detail-row"><span class="detail-label">접수번호</span><span class="detail-value">${d.rcept_no || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">공시일자</span><span class="detail-value">${formatDateDisplay(d.rcept_dt)}</span></div>
          <div class="detail-row"><span class="detail-label">공시유형</span><span class="detail-value">${d.pblntf_detail_ty || d.pblntf_ty || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">제출인</span><span class="detail-value">${escapeHtml(d.flr_nm || '-')}</span></div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleItem(header) {
  header.nextElementSibling.classList.toggle('open');
}

function openDart(rceptNo) {
  window.open(`https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rceptNo}`, '_blank');
}

function copyItem(rceptNo, reportNm, rceptDt) {
  const text = `[${formatDateDisplay(rceptDt)}] ${reportNm}\nhttps://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rceptNo}`;
  navigator.clipboard.writeText(text).then(() => showToast('복사 완료'));
}

function copyAll() {
  const filtered = currentFilter
    ? allDisclosures.filter(d => d.pblntf_ty === currentFilter || d.pblntf_detail_ty === currentFilter)
    : allDisclosures;

  const companyName = document.getElementById('companyName').textContent;
  let text = `=== ${companyName} DART 공시 목록 (최근 2년) ===\n\n`;

  filtered.forEach((d, i) => {
    text += `${i+1}. [${formatDateDisplay(d.rcept_dt)}] ${d.report_nm}\n`;
    text += `   링크: https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${d.rcept_no}\n\n`;
  });

  navigator.clipboard.writeText(text).then(() => showToast(`${filtered.length}건 복사 완료`));
}

// ── 유틸 ──
function getBadge(ty, detail, name) {
  const text = `${ty || ''} ${detail || ''} ${name || ''}`;

  if (ty === 'A001' || text.includes('사업보고서')) return { label: '사업보고서', cls: 'badge-사업보고서' };
  if (ty === 'A002' || text.includes('반기보고서')) return { label: '반기보고서', cls: 'badge-반기보고서' };
  if (ty === 'A003' || text.includes('분기보고서')) return { label: '분기보고서', cls: 'badge-분기보고서' };
  if (ty === 'B001' || ty === 'B002' || text.includes('주요사항보고서')) return { label: '주요사항', cls: 'badge-주요사항' };
  if (ty === 'F001' || text.includes('감사보고서')) return { label: '감사보고서', cls: 'badge-감사보고서' };

  return { label: detail || ty || '기타', cls: 'badge-기타' };
}

function getText(node, tag) {
  return node.querySelector(tag)?.textContent?.trim() || '';
}

function formatDate(d) {
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

function formatDateDisplay(s) {
  if (!s || s.length < 8) return s || '-';
  return `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'block' : 'none';
  document.getElementById('searchBtn').disabled = v;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'
  }[m]));
}

function escapeJs(str) {
  return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, ' ');
}
</script>
</body>
</html>
