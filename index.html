<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DART 공시 뷰어</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }

  .header {
    background: #1B3A6B; color: white; padding: 18px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header span { font-size: 13px; opacity: 0.7; margin-left: auto; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .api-setup {
    background: white; border-radius: 10px; padding: 20px;
    margin-bottom: 20px; border: 1px solid #e2e8f0;
  }
  .api-setup h3 { font-size: 14px; color: #555; margin-bottom: 10px; }
  .api-row { display: flex; gap: 10px; }
  .api-row input {
    flex: 1; padding: 10px 14px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 14px; font-family: monospace;
    color: #333;
  }
  .api-row input:focus { outline: none; border-color: #1B3A6B; }
  .btn-save {
    padding: 10px 18px; background: #1B3A6B; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
    white-space: nowrap;
  }
  .btn-save:hover { background: #2E5DA8; }
  .api-status { font-size: 12px; margin-top: 8px; color: #888; }
  .api-status.ok { color: #16a34a; }

  .search-box {
    background: white; border-radius: 10px; padding: 20px;
    margin-bottom: 20px; border: 1px solid #e2e8f0;
  }
  .search-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .search-row input {
    flex: 1; padding: 12px 16px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 16px;
  }
  .search-row input:focus { outline: none; border-color: #1B3A6B; }
  .btn-search {
    padding: 12px 24px; background: #1B3A6B; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-size: 15px;
    font-weight: 600;
  }
  .btn-search:hover { background: #2E5DA8; }
  .btn-search:disabled { background: #9ca3af; cursor: not-allowed; }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 20px;
    background: white; cursor: pointer; font-size: 13px; color: #555;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: #1B3A6B; color: white; border-color: #1B3A6B;
  }

  .company-info {
    background: #EEF3FB; border-radius: 10px; padding: 16px 20px;
    margin-bottom: 16px; border: 1px solid #C0CDE8; display: none;
  }
  .company-info h2 { font-size: 18px; color: #1B3A6B; margin-bottom: 6px; }
  .company-meta { font-size: 13px; color: #555; display: flex; gap: 16px; flex-wrap: wrap; }

  .results { display: none; }
  .results-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .results-count { font-size: 14px; color: #555; }
  .btn-copy-all {
    padding: 8px 16px; background: #059669; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  .btn-copy-all:hover { background: #047857; }

  .dart-item {
    background: white; border-radius: 10px; margin-bottom: 10px;
    border: 1px solid #e2e8f0; overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .dart-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .item-header {
    padding: 14px 18px; cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .item-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 4px; white-space: nowrap; margin-top: 2px;
    flex-shrink: 0;
  }
  .badge-사업보고서 { background: #DBEAFE; color: #1e40af; }
  .badge-분기보고서 { background: #D1FAE5; color: #065f46; }
  .badge-주요사항 { background: #FEF3C7; color: #92400e; }
  .badge-기타 { background: #F3F4F6; color: #374151; }

  .item-title { font-size: 14px; color: #1a1a1a; flex: 1; line-height: 1.5; }
  .item-date { font-size: 12px; color: #888; white-space: nowrap; margin-left: auto; }

  .item-body { display: none; padding: 0 18px 16px; }
  .item-body.open { display: block; }

  .item-links { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .btn-dart {
    padding: 7px 14px; border-radius: 6px; font-size: 13px;
    cursor: pointer; border: none; font-weight: 500;
  }
  .btn-open { background: #1B3A6B; color: white; }
  .btn-open:hover { background: #2E5DA8; }
  .btn-copy { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
  .btn-copy:hover { background: #e5e7eb; }

  .item-detail {
    background: #f8fafc; border-radius: 8px; padding: 14px;
    font-size: 13px; color: #333; line-height: 1.8;
    border: 1px solid #e2e8f0;
  }
  .detail-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .detail-label { color: #888; min-width: 80px; flex-shrink: 0; }
  .detail-value { color: #1a1a1a; }

  .loading {
    text-align: center; padding: 40px;
    color: #888; font-size: 15px; display: none;
  }
  .loading::before {
    content: ''; display: block; width: 36px; height: 36px;
    border: 3px solid #e2e8f0; border-top-color: #1B3A6B;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 40px; color: #888; display: none; }
  .error-msg {
    background: #FEE2E2; border: 1px solid #FCA5A5; border-radius: 8px;
    padding: 14px 18px; color: #991b1b; font-size: 14px;
    margin-bottom: 16px; display: none;
  }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1B3A6B; color: white; padding: 12px 20px;
    border-radius: 8px; font-size: 14px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <span>📊</span>
  <h1>DART 공시 뷰어</h1>
  <span>투자 분석용 공시 조회 도구</span>
</div>

<div class="container">

  <!-- API 키 설정 -->
  <div class="api-setup">
    <h3>🔑 DART API 키 설정 (최초 1회만)</h3>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="DART OpenAPI 인증키를 입력하세요">
      <button class="btn-save" onclick="saveApiKey()">저장</button>
    </div>
    <div class="api-status" id="apiStatus">API 키를 입력하고 저장하세요.</div>
  </div>

  <!-- 검색 -->
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="기업명 또는 종목코드 입력 (예: 삼성전자, 005930)"
        onkeydown="if(event.key==='Enter') search()">
      <button class="btn-search" id="searchBtn" onclick="search()">조회</button>
    </div>
    <div class="filter-row">
      <span style="font-size:13px;color:#888;align-self:center;">공시 유형:</span>
      <button class="filter-btn active" onclick="setFilter(this,'')">전체</button>
      <button class="filter-btn" onclick="setFilter(this,'A001')">사업보고서</button>
      <button class="filter-btn" onclick="setFilter(this,'A002')">반기보고서</button>
      <button class="filter-btn" onclick="setFilter(this,'A003')">분기보고서</button>
      <button class="filter-btn" onclick="setFilter(this,'B001')">주요사항보고</button>
      <button class="filter-btn" onclick="setFilter(this,'F001')">감사보고서</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- 회사 정보 -->
  <div class="company-info" id="companyInfo">
    <h2 id="companyName"></h2>
    <div class="company-meta" id="companyMeta"></div>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">공시 데이터를 불러오는 중...</div>
  <div class="empty" id="emptyMsg">검색 결과가 없습니다.</div>

  <!-- 결과 -->
  <div class="results" id="results">
    <div class="results-header">
      <div class="results-count" id="resultsCount"></div>
      <button class="btn-copy-all" onclick="copyAll()">📋 전체 목록 복사</button>
    </div>
    <div id="resultsList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const PROXY = 'https://corsproxy.io/?';
const DART_BASE = 'https://opendart.fss.or.kr/api';

let apiKey = '';
let currentFilter = '';
let currentCorpCode = '';
let allDisclosures = [];

// ── API 키 관리 ──
function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) return showToast('API 키를 입력해주세요');
  apiKey = val;
  localStorage.setItem('dartApiKey', val);
  document.getElementById('apiStatus').textContent = '✅ API 키가 저장되었습니다.';
  document.getElementById('apiStatus').className = 'api-status ok';
  showToast('API 키 저장 완료');
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('dartApiKey');
  if (saved) {
    apiKey = saved;
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('apiStatus').textContent = '✅ 저장된 API 키가 있습니다.';
    document.getElementById('apiStatus').className = 'api-status ok';
  }
});

// ── 필터 ──
function setFilter(el, val) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (allDisclosures.length) renderList(allDisclosures);
}

// ── 검색 ──
async function search() {
  if (!apiKey) return showError('API 키를 먼저 입력하고 저장해주세요.');
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return showError('기업명 또는 종목코드를 입력해주세요.');

  showLoading(true);
  hideError();
  document.getElementById('companyInfo').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('emptyMsg').style.display = 'none';

  try {
    // 기업 코드 조회
    const corpCode = await getCorpCode(q);
    if (!corpCode) { showLoading(false); return showError('기업을 찾을 수 없습니다. 정확한 기업명 또는 종목코드를 입력해주세요.'); }

    currentCorpCode = corpCode.corp_code;

    // 회사 정보 표시
    document.getElementById('companyName').textContent = corpCode.corp_name;
    document.getElementById('companyMeta').innerHTML =
      `<span>종목코드: ${corpCode.stock_code || '-'}</span>
       <span>법인코드: ${corpCode.corp_code}</span>
       <span>상장: ${corpCode.stock_code ? '상장' : '비상장'}</span>`;
    document.getElementById('companyInfo').style.display = 'block';

    // 공시 목록 조회
    const list = await getDisclosureList(corpCode.corp_code);
    allDisclosures = list;
    renderList(list);

  } catch(e) {
    showError('조회 중 오류가 발생했습니다: ' + e.message);
  }
  showLoading(false);
}

// ── 기업코드 조회 ──
async function getCorpCode(query) {
  // 종목코드 형식이면 바로 조회
  const isCode = /^\d{6}$/.test(query);

  const url = `${PROXY}${encodeURIComponent(
    `${DART_BASE}/company.json?crtfc_key=${apiKey}&${isCode ? 'stock_code' : 'corp_name'}=${encodeURIComponent(query)}`
  )}`;

  const res = await fetch(url);
  const data = await res.json();

  if (data.status === '000' && data.corp_name) return data;

  // 검색으로 시도
  const url2 = `${PROXY}${encodeURIComponent(
    `${DART_BASE}/company.json?crtfc_key=${apiKey}&corp_name=${encodeURIComponent(query)}`
  )}`;
  const res2 = await fetch(url2);
  const data2 = await res2.json();
  if (data2.status === '000') return data2;
  return null;
}

// ── 공시 목록 조회 ──
async function getDisclosureList(corpCode) {
  const today = new Date();
  const end = formatDate(today);
  const start = formatDate(new Date(today.setFullYear(today.getFullYear() - 2)));

  const url = `${PROXY}${encodeURIComponent(
    `${DART_BASE}/list.json?crtfc_key=${apiKey}&corp_code=${corpCode}&bgn_de=${start}&end_de=${end}&page_count=100`
  )}`;

  const res = await fetch(url);
  const data = await res.json();

  if (data.status !== '000') throw new Error(data.message || '공시 조회 실패');
  return data.list || [];
}

// ── 렌더링 ──
function renderList(list) {
  const filtered = currentFilter
    ? list.filter(d => d.pblntf_ty === currentFilter)
    : list;

  const container = document.getElementById('resultsList');
  container.innerHTML = '';

  if (!filtered.length) {
    document.getElementById('results').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }

  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('resultsCount').textContent =
    `총 ${filtered.length}건 (최근 2년)`;

  filtered.forEach(d => {
    const badge = getBadge(d.pblntf_ty, d.pblntf_detail_ty);
    const div = document.createElement('div');
    div.className = 'dart-item';
    div.innerHTML = `
      <div class="item-header" onclick="toggleItem(this)">
        <span class="item-badge ${badge.cls}">${badge.label}</span>
        <span class="item-title">${d.report_nm}</span>
        <span class="item-date">${formatDateDisplay(d.rcept_dt)}</span>
      </div>
      <div class="item-body">
        <div class="item-links">
          <button class="btn-dart btn-open" onclick="openDart('${d.rcept_no}')">🔗 DART에서 열기</button>
          <button class="btn-dart btn-copy" onclick="copyItem(this, '${d.rcept_no}', '${escape(d.report_nm)}', '${d.rcept_dt}')">📋 이 공시 복사</button>
        </div>
        <div class="item-detail">
          <div class="detail-row"><span class="detail-label">접수번호</span><span class="detail-value">${d.rcept_no}</span></div>
          <div class="detail-row"><span class="detail-label">공시일자</span><span class="detail-value">${formatDateDisplay(d.rcept_dt)}</span></div>
          <div class="detail-row"><span class="detail-label">공시유형</span><span class="detail-value">${d.pblntf_detail_ty || d.pblntf_ty}</span></div>
          <div class="detail-row"><span class="detail-label">제출인</span><span class="detail-value">${d.flr_nm}</span></div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// ── 토글 ──
function toggleItem(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

// ── DART 열기 ──
function openDart(rceptNo) {
  window.open(`https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rceptNo}`, '_blank');
}

// ── 개별 복사 ──
function copyItem(btn, rceptNo, reportNm, rceptDt) {
  const text = `[${formatDateDisplay(rceptDt)}] ${unescape(reportNm)}\nhttps://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rceptNo}`;
  navigator.clipboard.writeText(text).then(() => showToast('복사 완료'));
}

// ── 전체 복사 (Claude에 붙여넣기용) ──
function copyAll() {
  const filtered = currentFilter
    ? allDisclosures.filter(d => d.pblntf_ty === currentFilter)
    : allDisclosures;

  const companyName = document.getElementById('companyName').textContent;
  let text = `=== ${companyName} DART 공시 목록 (최근 2년) ===\n\n`;

  filtered.forEach((d, i) => {
    text += `${i+1}. [${formatDateDisplay(d.rcept_dt)}] ${d.report_nm}\n`;
    text += `   링크: https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${d.rcept_no}\n\n`;
  });

  navigator.clipboard.writeText(text).then(() => showToast(`${filtered.length}건 복사 완료 — Claude에 붙여넣으세요`));
}

// ── 유틸 ──
function getBadge(ty, detail) {
  if (ty === 'A001' || (detail && detail.includes('사업보고서'))) return { label: '사업보고서', cls: 'badge-사업보고서' };
  if (ty === 'A002' || ty === 'A003') return { label: ty === 'A002' ? '반기보고서' : '분기보고서', cls: 'badge-분기보고서' };
  if (ty === 'B001' || ty === 'B002') return { label: '주요사항', cls: 'badge-주요사항' };
  return { label: detail || ty || '기타', cls: 'badge-기타' };
}

function formatDate(d) {
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

function formatDateDisplay(s) {
  if (!s || s.length < 8) return s;
  return `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'block' : 'none';
  document.getElementById('searchBtn').disabled = v;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
